<config format="xml">

<!-- InspIRCd Configuration File for Ray Chad IRC Server -->
<!-- This is the main configuration file for the InspIRCd IRC server -->

<!-- Server Information -->
<server
	name="raychd.local"
	description="Ray Chad IRC Server"
	network="RayNet"
	hidden="no">

<!-- Bind addresses - where the server listens for connections -->
<!-- Standard IRC port -->
<bind address="0.0.0.0" port="6667" type="clients">
<bind address="::" port="6667" type="clients">

<!-- Secure SSL/TLS port -->
<bind address="0.0.0.0" port="6697" type="clients" ssl="gnutls">
<bind address="::" port="6697" type="clients" ssl="gnutls">

<!-- Server linking port (for server-to-server connections) -->
<bind address="0.0.0.0" port="7000" type="servers">

<!-- Connection settings -->
<connect
	name="*"
	allow="*"
	maxchans="20"
	maxconnwait="3"
	timeout="10"
	pingfreq="60"
	hardsend="1"
	recvq="8000"
	sendq="16000"
	local="yes">

<!-- Operator access -->
<oper
	name="admin"
	password="change_this_password"
	hash="sha256"
	host="*@*"
	type="NetAdmin">

<!-- Channel settings -->
<channel
	name="#general"
	modes="+nt"
	topic="Welcome to Ray Chad IRC Server">

<channel
	name="#dev"
	modes="+nt"
	topic="Development discussion">

<!-- Module loading -->
<!-- Core modules -->
<module name="m_spanningtree.so">
<module name="m_ssl_gnutls.so">
<module name="m_mysql.so">
<module name="m_regex_glob.so">

<!-- Optional modules for enhanced functionality -->
<module name="m_admin.so">
<module name="m_alias.so">
<module name="m_antibottrap.so">
<module name="m_banredirect.so">
<module name="m_blockcolor.so">
<module name="m_botmode.so">
<module name="m_cap.so">
<module name="m_chghost.so">
<module name="m_chgname.so">
<module name="m_conn_join.so">
<module name="m_conn_waitpong.so">
<module name="m_customtitle.so">
<module name="m_deaf.so">
<module name="m_exemptchanops.so">
<module name="m_filter.so">
<module name="m_gecosban.so">
<module name="m_globalload.so">
<module name="m_helpop.so">
<module name="m_hideserver.so">
<module name="m_hostchange.so">
<module name="m_inviteexception.so">
<module name="m_ircv3.so">
<module name="m_joinpart.so">
<module name="m_knock.so">
<module name="m_lockserv.so">
<module name="m_muteban.so">
<module name="m_namesx.so">
<module name="m_netsplit.so">
<module name="m_nokicks.so">
<module name="m_noctcp.so">
<module name="m_nonotice.so">
<module name="m_noticeban.so">
<module name="m_opermotd.so">
<module name="m_operlog.so">
<module name="m_operspy.so">
<module name="m_override.so">
<module name="m_passforward.so">
<module name="m_permchannels.so">
<module name="m_perm_membership.so">
<module name="m_redirect.so">
<module name="m_repeat.so">
<module name="m_restrictchans.so">
<module name="m_rline.so">
<module name="m_sasl.so">
<module name="m_securelist.so">
<module name="m_servprotect.so">
<module name="m_sethost.so">
<module name="m_sslinfo.so">
<module name="m_stats.so">
<module name="m_stripcolor.so">
<module name="m_syslog.so">
<module name="m_timedbans.so">
<module name="m_userip.so">
<module name="m_usercounter.so">
<module name="m_vhost.so">
<module name="m_watch.so">
<module name="m_xline_db.so">

<!-- Logging -->
<log method="file" type="* -userinvite" level="default" target="ircd.log">

<!-- Command aliases -->
<alias text="NICKSERV" replace="PRIVMSG NickServ :$2-" requires="NickServ">
<alias text="CHANSERV" replace="PRIVMSG ChanServ :$2-" requires="ChanServ">
<alias text="MEMOSERV" replace="PRIVMSG MemoServ :$2-" requires="MemoServ">
<alias text="HOSTSERV" replace="PRIVMSG HostServ :$2-" requires="HostServ">
<alias text="BOTSERV" replace="PRIVMSG BotServ :$2-" requires="BotServ">

<!-- Security and ban settings -->
<security
	announceinvites="dynamic"
	hideulinux="no"
	hidebans="no"
	flatlinks="no"
	hidewhois=""
	nonusersallow="yes"
	restrictbannedusers="yes">

<!-- Performance tuning -->
<performance
	somaxconn="128"
	softlimit="1024"
	hardlimit="2048"
	timeskip="10">

</config>
